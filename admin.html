<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin</title>

<style>

*{box-sizing:border-box;}

body{
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.box{
background:#1e293b;
padding:30px;
border-radius:12px;
width:90%;
max-width:400px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-top:10px;
}

button{
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
}

button.logout{
background:#ef4444;
}

.hidden{
display:none;
}

.status{
margin-top:10px;
font-size:14px;
}

</style>

</head>

<body>


<!-- LOGIN -->

<div class="box" id="loginBox">

<h2>Admin Login</h2>

<input id="login" placeholder="Login" autocomplete="username">

<input id="password" type="password" placeholder="Password" autocomplete="current-password">

<button type="button" onclick="login()">Login</button>

<p id="loginStatus" class="status"></p>

</div>



<!-- ADMIN PANEL -->

<div class="box hidden" id="adminBox">

<h2>URL Redirect Manager</h2>

<input id="url" placeholder="https://example.com">

<button onclick="paste()">📋 Paste</button>

<button onclick="save()">💾 Save</button>

<button class="logout" onclick="logout()">Logout</button>

<p id="status" class="status"></p>

</div>



<script>

const authCSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vQrgA2w-nUqD7SOjZFZWDPiFcZ4G0l6d8eM9uYdxD7MeAZ6lB9Ijpn0wJAgNEoTwGGqRMEx-EkwKvTC/pub?output=csv";

console.log("Admin script loaded");



async function login(){

console.log("Login button pressed");

const loginInput=document.getElementById("login").value.trim();
const passInput=document.getElementById("password").value.trim();

console.log("Entered login:",loginInput);

const status=document.getElementById("loginStatus");

status.innerText="";
status.style.color="";

if(!loginInput||!passInput){

status.innerText="⚠ Введите логин и пароль";
status.style.color="red";

console.warn("Empty login or password");

return;

}

try{

console.log("Fetching CSV...");

const res=await fetch(authCSV+"&t="+Date.now());

console.log("Fetch response:",res);

const text=await res.text();

console.log("CSV content:",text);

const row=text.trim().split("\n")[0];

const parts=row.split(",");

const login=parts[0];
const pass=parts[1];

console.log("Expected:",login,pass);

if(loginInput===login && passInput===pass){

console.log("Login success");

localStorage.setItem("adminAuth","1");

showAdmin();

}else{

console.warn("Login failed");

status.innerText="❌ Неверный логин или пароль";
status.style.color="red";

}

}catch(err){

console.error("Auth error:",err);

status.innerText="⚠ Ошибка загрузки авторизации";
status.style.color="red";

}

}



function showAdmin(){

console.log("Opening admin panel");

document.getElementById("loginBox").classList.add("hidden");
document.getElementById("adminBox").classList.remove("hidden");

}



function logout(){

console.log("Logout");

localStorage.removeItem("adminAuth");

location.reload();

}



if(localStorage.getItem("adminAuth")){

console.log("User already authorized");

showAdmin();

}



document.getElementById("password")
.addEventListener("keydown",e=>{

if(e.key==="Enter"){

login();

}

});



async function paste(){

console.log("Paste clicked");

try{

const text=await navigator.clipboard.readText();

console.log("Clipboard:",text);

document.getElementById("url").value=text;

}catch(err){

console.error("Clipboard error:",err);

}

}



async function save(){

console.log("Save clicked");

const url=document.getElementById("url").value.trim();

console.log("URL:",url);

if(!url){

document.getElementById("status").innerText="⚠ Введите URL";
document.getElementById("status").style.color="red";

return;

}

try{

await fetch(
"https://docs.google.com/forms/u/0/d/e/1FAIpQLSfL4qKW7pzWmLJURy46AUi7HwJQ_Vd_wm4Dc6anvpzq_C82Ow/formResponse",
{
method:"POST",
mode:"no-cors",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:`entry.1579941584=${encodeURIComponent(url)}`
}
);

console.log("Form submitted");

const status=document.getElementById("status");

status.innerText="✅ Saved";
status.style.color="lightgreen";

}catch(err){

console.error("Save error:",err);

const status=document.getElementById("status");

status.innerText="❌ Error saving";
status.style.color="red";

}

}

</script>

</body>
</html>
