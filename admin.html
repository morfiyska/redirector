<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin</title>

<style>

*{box-sizing:border-box;}

body{
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.box{
background:#1e293b;
padding:30px;
border-radius:12px;
width:90%;
max-width:400px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-top:10px;
}

button{
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="box" id="loginBox">

<h2>Admin Login</h2>

<form onsubmit="login(event)">

<input id="login" placeholder="Login" autocomplete="username">

<input id="password" type="password" placeholder="Password" autocomplete="current-password">

<button type="submit">Login</button>

</form>

<p id="loginStatus"></p>

</div>


<!-- ADMIN PANEL -->

<div class="box hidden" id="adminBox">

<h2>URL Redirect Manager</h2>

<input id="url" placeholder="https://example.com">

<button onclick="paste()">📋 Paste</button>

<button onclick="save()">💾 Save</button>

<p id="status"></p>

</div>


<script>

const authCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrgA2w-nUqD7SOjZFZWDPiFcZ4G0l6d8eM9uYdxD7MeAZ6lB9Ijpn0wJAgNEoTwGGqRMEx-EkwKvTC/pub?output=csv";

console.log("Admin script loaded");

async function login(e){

console.log("Login button pressed");

e.preventDefault();

const loginInput = document.getElementById("login").value;
const passInput = document.getElementById("password").value;

console.log("User entered:", loginInput);

try{

console.log("Fetching auth CSV...");

const res = await fetch(authCSV + "&t=" + Date.now());

console.log("Fetch response:", res);

const text = await res.text();

console.log("CSV content:", text);

const row = text.trim().split("\n")[0];

console.log("Parsed row:", row);

const parts = row.split(",");

const login = parts[0];
const pass = parts[1];

console.log("Expected login:", login);

if(loginInput === login && passInput === pass){

console.log("Login success");

localStorage.setItem("adminAuth","1");

showAdmin();

}else{

console.warn("Login failed");

const el = document.getElementById("loginStatus");

el.innerText="❌ Неверный логин или пароль";
el.style.color="red";

}

}catch(err){

console.error("Auth error:", err);

const el = document.getElementById("loginStatus");

el.innerText="⚠ Ошибка загрузки авторизации";
el.style.color="red";

}

}

function showAdmin(){

console.log("Showing admin panel");

document.getElementById("loginBox").classList.add("hidden");
document.getElementById("adminBox").classList.remove("hidden");

}

if(localStorage.getItem("adminAuth")){

console.log("Already authorized");

showAdmin();

}

async function paste(){

console.log("Paste button clicked");

try{

const text = await navigator.clipboard.readText();

console.log("Clipboard content:", text);

document.getElementById("url").value = text;

}catch(err){

console.error("Clipboard error:", err);

}

}

async function save(){

console.log("Save button clicked");

const url = document.getElementById("url").value;

console.log("Saving URL:", url);

try{

await fetch(
"https://docs.google.com/forms/u/0/d/e/1FAIpQLSfL4qKW7pzWmLJURy46AUi7HwJQ_Vd_wm4Dc6anvpzq_C82Ow/formResponse",
{
method:"POST",
mode:"no-cors",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:`entry.1579941584=${encodeURIComponent(url)}`
}
);

console.log("Form submitted");

document.getElementById("status").innerText="Saved";

}catch(err){

console.error("Save error:", err);

document.getElementById("status").innerText="Error saving";

}

}

</script>

</body>
</html>
